  --color-text-heading: #1E394E;

  /* ── Icon ── */
  --color-icon-close: #627386;  /* single global color for all close/dismiss icons */

  /* ── Status: info ── */
  --color-info-bg:        #F2F6FA;
  --color-info-border:    #1E394E;
  --color-info-icon:      #627386;

  /* ── Status: success ── */
  --color-success-bg:     #E7F4E4;
  --color-success-border: #277036;
  --color-success-icon:   #2E8540;

  /* ── Status: warning ── */
  --color-warning-bg:     #F9E6CF;
  --color-warning-border: #975220;
  --color-warning-icon:   #B05D23;

  /* ── Status: error ── */
  --color-error-bg:       #F9E9E8;
  --color-error-border:   #C53026;
  --color-error-icon:     #C53026;

  /* ── Shadow ── */
  --shadow-default: 0px 4px 8px 0px rgba(38, 44, 54, 0.15);

  /* ── Spacing ── */
  --space-4:  4px;
  --space-6:  6px;
  --space-8:  8px;
  --space-12: 12px;
  --space-24: 24px;
  --space-40: 40px;

  /* ── Border radius ── */
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;

  /* ── Alert component sizing ──
     Source: Figma Alert component set, Release 6.0.0
     Note: ±1px text vertical alignment difference between Figma and browser
     is expected and within accepted tolerance (Figma uses its own rendering
     engine; browsers use OS font engines — CoreText/DirectWrite). */
  --alert-icon-h-sm:   32px;
  --alert-icon-h-md:   36px;
  --alert-icon-h-lg:   40px;

  --alert-icon-sz-sm:  16px;
  --alert-icon-sz-md:  24px;
  --alert-icon-sz-lg:  32px;

  /* Close button: width 24px (WCAG 2.5.8 min touch target),
     height matches icon container height per size */
  --alert-close-w:     24px;
  --alert-close-sz-sm: 12px;
  --alert-close-sz-md: 16px;
  --alert-close-sz-lg: 20px;

  --alert-min-w-sm: 288px;
  --alert-min-w-md: 576px;
  --alert-min-w-lg: 992px;
}

/* alert.css */
/* ═══════════════════════════════════════════════════════════════
   Ontada Design System — Alert component styles
   Requires: tokens.css imported at root
   WCAG 2.2 AA compliant — Release 6.0.0
   ═══════════════════════════════════════════════════════════════ */

.al {
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  border: 1px solid;
  width: 100%;
}

.al__icon {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  align-self: flex-start;
}

/* Figma: justifyContent center + alignSelf stretch + vertical fill
   Browser note: ±1px vertical text offset vs Figma is within accepted
   tolerance due to OS font rendering engine differences. */
.al__text {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-width: 0;
  align-self: stretch;
  justify-content: center;
}

.al__title {
  display: block;
  font-family: var(--font-family-base);
  font-weight: var(--font-weight-bold);
  color: var(--color-text-primary);
  margin: 0;
  -webkit-font-smoothing: antialiased;
}

.al__body {
  font-family: var(--font-family-base);
  font-weight: var(--font-weight-semibold);
  color: var(--color-text-primary);
  margin: 0;
  -webkit-font-smoothing: antialiased;
}

.al__close {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  align-self: flex-start;
  width: var(--alert-close-w);
  background: none;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  cursor: pointer;
  padding: 0;
  transition: background 0.15s, border-color 0.15s;
}
.al__close:hover         { background: rgba(0, 0, 0, 0.07); border-color: rgba(0, 0, 0, 0.18); }
.al__close:focus-visible { outline: 2px solid var(--color-text-heading); outline-offset: 2px; }

/* ── Size variants ── */
.al--sm {
  gap: var(--space-12);
  padding: 7px 11px; /* 8/12px - 1px border compensation */
  border-radius: var(--radius-sm);
  min-width: var(--alert-min-w-sm);
}
.al--sm .al__icon  { width: var(--alert-icon-sz-sm); height: var(--alert-icon-h-sm); }
.al--sm .al__close { height: var(--alert-icon-h-sm); }
.al--sm .al__title { font-size: var(--font-size-sm); line-height: var(--line-height-sm); letter-spacing: var(--letter-spacing-sm); }
.al--sm .al__body  { font-size: var(--font-size-xs); line-height: var(--line-height-xs); letter-spacing: var(--letter-spacing-xs); }
.al--sm .al__text  { gap: var(--space-4); }

.al--md {
  gap: var(--space-24);
  padding: 11px 23px; /* 12/24px - 1px border compensation */
  border-radius: var(--radius-md);
  min-width: var(--alert-min-w-md);
}
.al--md .al__icon  { width: var(--alert-icon-sz-md); height: var(--alert-icon-h-md); }
.al--md .al__close { height: var(--alert-icon-h-md); }
.al--md .al__title { font-size: var(--font-size-md); line-height: var(--line-height-md); letter-spacing: var(--letter-spacing-md); }
.al--md .al__body  { font-size: var(--font-size-sm); line-height: var(--line-height-sm); letter-spacing: var(--letter-spacing-sm); }
.al--md .al__text  { gap: var(--space-6); }

.al--lg {
  gap: var(--space-40);
  padding: 15px 23px; /* 16/24px - 1px border compensation */
  border-radius: var(--radius-lg);
  min-width: var(--alert-min-w-lg);
}
.al--lg .al__icon  { width: var(--alert-icon-sz-lg); height: var(--alert-icon-h-lg); }
.al--lg .al__close { height: var(--alert-icon-h-lg); }
.al--lg .al__title { font-size: var(--font-size-lg); line-height: var(--line-height-lg); letter-spacing: var(--letter-spacing-lg); }
.al--lg .al__body  { font-size: var(--font-size-md); line-height: var(--line-height-md); letter-spacing: var(--letter-spacing-md); }
.al--lg .al__text  { gap: var(--space-8); }

/* ── Status variants ── */
.al--info    { background: var(--color-info-bg);    border-color: var(--color-info-border); }
.al--success { background: var(--color-success-bg); border-color: var(--color-success-border); }
.al--warning { background: var(--color-warning-bg); border-color: var(--color-warning-border); }
.al--error   { background: var(--color-error-bg);   border-color: var(--color-error-border); }
.al--shadow  { box-shadow: var(--shadow-default); }

@media (forced-colors: active) { .al { border: 2px solid ButtonText !important; } }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }

/* Page chrome */
*, *::before, *::after { box-sizing: border-box; }
body { font-family: var(--font-family-base); background: #F5F7F9; padding: 32px 24px; margin: 0; -webkit-font-smoothing: antialiased; }
.inner { max-width: 1060px; margin: 0 auto; }
.hdr h1 { font-size: 24px; font-weight: var(--font-weight-bold); color: var(--color-text-heading); margin: 0 0 4px; }
.hdr p  { font-size: 14px; font-weight: var(--font-weight-regular); color: var(--color-text-muted); margin: 0 0 28px; }
.controls { background: #fff; border: 1px solid #D8E3ED; border-radius: var(--radius-lg); padding: 14px 20px; display: flex; gap: var(--space-24); align-items: center; flex-wrap: wrap; margin-bottom: var(--space-24); }
.ctrl-label { font-size: 12px; font-weight: var(--font-weight-bold); color: var(--color-text-heading); margin-bottom: 6px; display: block; letter-spacing: .04em; }
.btn-group { display: flex; gap: var(--space-6); }
.sz-btn { font-family: var(--font-family-base); font-size: 12px; font-weight: var(--font-weight-bold); padding: 4px 14px; border-radius: var(--radius-sm); border: 1px solid #D8E3ED; background: #fff; color: var(--color-text-heading); cursor: pointer; letter-spacing: .04em; transition: all .15s; }
.sz-btn.active { background: var(--color-text-heading); color: #fff; border-color: var(--color-text-heading); }
.toggle-label { display: flex; align-items: center; gap: var(--space-8); cursor: pointer; font-size: 13px; font-weight: var(--font-weight-semibold); color: var(--color-text-heading); user-select: none; }
.alerts-grid { display: grid; gap: var(--space-12); }
</style>

const CLOSE_SZ = {sm:12,md:16,lg:20};
const ICON_SZ  = {sm:16,md:24,lg:32};
const DEMOS = [
  {status:"info",    title:"Informational title", body:"Lorem ipsum dolor sit amet, consectetur adipiscing elit. Mauris tincidunt tincidunt nunc, ac facilisis risus. Nunc rutrum eros sed arcu lacinia, vitae aliquam mi suscipit."},
  {status:"success", title:"Success title",        body:"Lorem ipsum dolor sit amet, consectetur adipiscing elit. Mauris tincidunt tincidunt nunc, ac facilisis risus. Nunc rutrum eros sed arcu lacinia, vitae aliquam mi suscipit."},
  {status:"warning", title:"Warning title",        body:"Lorem ipsum dolor sit amet, consectetur adipiscing elit. Mauris tincidunt tincidunt nunc, ac facilisis risus. Nunc rutrum eros sed arcu lacinia, vitae aliquam mi suscipit."},
  {status:"error",   title:"Error title",          body:"Lorem ipsum dolor sit amet, consectetur adipiscing elit. Mauris tincidunt tincidunt nunc, ac facilisis risus. Nunc rutrum eros sed arcu lacinia, vitae aliquam mi suscipit."}
];
const LABELS = {info:"Information",success:"Success",warning:"Warning",error:"Error"};
let sz="md",shadow=false,showTitle=true,showBody=true,showClose=true,dismissed=new Set();
const tv = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const svg = (p,vb,s,c) => `<svg width="${s}" height="${s}" viewBox="${vb}" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">${p.replace(/fill="FILL"/g,`fill="${c}"`)}</svg>`;
function buildAlert(d) {
  const id=`al-${d.status}`;
  if(dismissed.has(id)) return "";
  const urgent=d.status==="error"||d.status==="warning";
  const tid=`${id}-title`,bid=`${id}-body`;
  return `<div id="${id}" class="al al--${d.status} al--${sz}${shadow?" al--shadow":""}"
    role="${urgent?"alert":"status"}" aria-live="${urgent?"assertive":"polite"}" aria-atomic="true"
    ${showTitle?`aria-labelledby="${tid}"`:""}aria-describedby="${bid}">
    <span class="al__icon" aria-hidden="true">${svg(ICONS[d.status].path,ICONS[d.status].vb,ICON_SZ[sz],tv(ICONS[d.status].cssVar))}</span>
    <div class="al__text">
      ${showTitle?`<strong id="${tid}" class="al__title">${d.title}</strong>`:""}
      ${showBody?`<p id="${bid}" class="al__body">${d.body}</p>`:`<span id="${bid}" class="sr-only">${d.body}</span>`}
    </div>
    ${showClose?`<button type="button" class="al__close" data-id="${id}" aria-label="Dismiss ${LABELS[d.status].toLowerCase()} alert${showTitle?": "+d.title:""}">
      ${svg(ICONS.close.path,ICONS.close.vb,CLOSE_SZ[sz],tv("--color-icon-close"))}
      <span class="sr-only">Dismiss</span></button>`:""}
  </div>`;
}
function render() {
  const g=document.getElementById("alertGrid");
  g.innerHTML=DEMOS.map(d=>buildAlert(d)).join("");
  g.querySelectorAll(".al__close").forEach(b=>b.addEventListener("click",()=>{dismissed.add(b.dataset.id);render();}));
}
document.getElementById("sizeGroup").addEventListener("click",e=>{
  const b=e.target.closest(".sz-btn");if(!b)return;
  sz=b.dataset.size;
  document.querySelectorAll(".sz-btn").forEach(x=>x.classList.toggle("active",x===b));
  dismissed.clear();render();
});
["shadowToggle","titleToggle","bodyToggle","closeToggle"].forEach(id=>{
  document.getElementById(id).addEventListener("change",e=>{
    if(id==="shadowToggle")shadow=e.target.checked;
    else if(id==="titleToggle"){showTitle=e.target.checked;dismissed.clear();}
    else if(id==="bodyToggle"){showBody=e.target.checked;dismissed.clear();}
    else{showClose=e.target.checked;dismissed.clear();}
    render();
  });
});
render();
</script>
